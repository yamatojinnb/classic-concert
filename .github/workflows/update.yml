name: Update Site

# 毎日 06:00 JST（UTC 21:00）に自動実行 + 手動実行
# GitHub Pagesは「main ブランチ / ルート」から公開する設定のため、
# ここでは index.html と concerts.json を生成して main に直接コミットする。
on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-site
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scrape（負荷配慮のため先頭20ページに制限。全件にするなら --max を外す）
        run: python scraper.py --max 20

      - name: Build site
        run: python build.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html concerts.json
          git diff --cached --quiet && echo "no changes" || git commit -m "chore: update concert data ($(date +'%Y-%m-%d %H:%M') JST)"
          git push
